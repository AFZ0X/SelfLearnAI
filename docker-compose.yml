version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:0.8.3-pg18-trixie
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: selflearn_ai
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
